<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mumbai Food Content Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0D;
      color: #F0EDE8;
      font-family: 'DM Mono', 'Courier New', monospace;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .header {
      padding: 36px 20px 24px;
      border-bottom: 1px solid #1A1A1A;
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0D0D0D;
    }

    .header-inner { max-width: 680px; margin: 0 auto; }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .brand-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #FF6B35 0%, #E63946 50%, #9B5DE5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { font-size: 10px; color: #444; margin-top: 4px; }

    .post-count {
      text-align: right;
    }

    .count-num {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      color: #F0EDE8;
      transition: color 0.3s;
    }

    .count-num.done { color: #4ADE80; }
    .count-denom { font-size: 14px; color: #444; font-family: 'DM Mono', monospace; }
    .count-label { font-size: 9px; color: #444; letter-spacing: 1px; text-transform: uppercase; }

    .progress-wrap { margin-bottom: 16px; }
    .progress-bar { height: 5px; background: #1A1A1A; border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B35, #E63946, #9B5DE5);
      border-radius: 999px;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 9px;
      color: #333;
    }

    .status-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      border: 1px solid;
      font-family: 'DM Mono', monospace;
    }

    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .week-pill {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid #2A2A2A;
      background: transparent;
      color: #666;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.18s;
      font-weight: 500;
    }

    .week-pill:hover, .week-pill.active {
      color: #F0EDE8;
      border-color: #F0EDE8;
      background: #1A1A1A;
    }

    .calendar { max-width: 680px; margin: 24px auto 0; padding: 0 20px; }

    .week-block { margin-bottom: 32px; }

    .week-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .week-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .week-line { flex: 1; height: 1px; background: #1E1E1E; }
    .week-count { font-size: 9px; color: #333; }

    .cards { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #333; }
    .card.expanded { border-color: #444; }

    .card-header {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }

    .card-header:hover { background: rgba(255,255,255,0.02); }

    .day-icon-box {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: #1A1A1A;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #222;
    }

    .day-emoji { font-size: 16px; line-height: 1; }
    .day-label { font-size: 9px; color: #555; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

    .card-meta { flex: 1; min-width: 0; }

    .badge-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .format-badge {
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 9px;
      border: 1px solid;
      font-family: 'DM Mono', monospace;
    }

    .location-text { font-size: 10px; color: #555; }

    .card-topic {
      font-size: 12px;
      color: #D0CAC4;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-hook {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-style: italic;
    }

    .expand-arrow {
      color: #444;
      font-size: 14px;
      flex-shrink: 0;
      transition: transform 0.2s;
      user-select: none;
    }

    .expand-arrow.open { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 16px 18px;
      border-top: 1px solid #1E1E1E;
      animation: fadeDown 0.2s ease;
    }

    .card-body.open { display: block; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .edit-hint {
      font-size: 9px;
      color: #333;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 0 10px;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group.full { grid-column: 1 / -1; }

    .field-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #444;
      font-weight: 500;
    }

    .editable-text {
      cursor: text;
      font-size: 12px;
      border-bottom: 1px dashed #333;
      padding-bottom: 1px;
      display: inline-block;
      min-width: 40px;
      min-height: 18px;
      color: #E8E4DF;
      font-family: 'DM Mono', monospace;
      outline: none;
      width: 100%;
    }

    .editable-text:empty::before {
      content: attr(data-placeholder);
      color: #444;
    }

    select.field-select {
      background: #111;
      border: 1px solid #333;
      color: #E8E4DF;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      outline: none;
      width: 100%;
    }

    select.field-select option { background: #1A1A1A; }

    textarea.field-textarea {
      background: #111;
      border: 1px solid #333;
      color: #E8E4DF;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      resize: none;
      outline: none;
      width: 100%;
      min-height: 52px;
    }

    textarea.field-textarea:focus,
    select.field-select:focus { border-color: #555; }

    .footer-msg {
      text-align: center;
      padding: 28px 0;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #4ADE80;
      display: none;
    }

    .footer-msg.show { display: block; }

    .footer-brand {
      text-align: center;
      padding: 20px 0 0;
      font-size: 9px;
      color: #2A2A2A;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="brand-label">Mumbai Food Creator</div>
        <h1>Content Calendar</h1>
        <div class="subtitle">20 posts · 4 weeks · tap any card to edit</div>
      </div>
      <div class="post-count">
        <div class="count-num" id="postedCount">0<span class="count-denom">/20</span></div>
        <div class="count-label">posted</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-labels">
        <span>Week 1</span><span>Week 2</span><span>Week 3</span><span>Week 4</span>
      </div>
    </div>

    <div class="status-row" id="statusRow"></div>

    <div class="filter-row" id="filterRow"></div>
  </div>
</div>

<div class="calendar" id="calendar"></div>

<script>
const data = [
  { day:1,  label:"Mon", week:1, date:"", contentType:"Street Food",  topic:"Best ₹100 meal in Mumbai",                    hook:"You won't believe what ₹100 gets you in Mumbai 👀",          location:"", status:"Planned", notes:"", format:"Static Post", icon:"🛺" },
  { day:2,  label:"Wed", week:1, date:"", contentType:"Cafe Review",   topic:"Cafe review — honest + aesthetic shots",         hook:"Is this cafe actually worth the hype?",                     location:"", status:"Planned", notes:"", format:"Carousel",    icon:"☕" },
  { day:3,  label:"Fri", week:1, date:"", contentType:"Trend Reel",    topic:"Trend reel + food (trending audio)",             hook:"POV: You found Mumbai's best kept secret 🔥",               location:"", status:"Planned", notes:"", format:"Reel",         icon:"🎵" },
  { day:4,  label:"Sat", week:1, date:"", contentType:"Mini Vlog",     topic:"Spent ₹500 eating all day",                     hook:"I spent ₹500 on food today — here's everything I ate",      location:"", status:"Planned", notes:"", format:"Vlog",         icon:"🎬" },
  { day:5,  label:"Sun", week:1, date:"", contentType:"Top List",      topic:"Top 3 must-try dishes at [place]",              hook:"Top 3 dishes you CANNOT leave without trying",              location:"", status:"Planned", notes:"", format:"Carousel",    icon:"🏆" },
  { day:6,  label:"Mon", week:2, date:"", contentType:"Hidden Gem",    topic:"Hidden street food spot in Mumbai",              hook:"This hidden spot in Mumbai will change your life 🗺️",      location:"", status:"Planned", notes:"", format:"Static Post", icon:"🗺️" },
  { day:7,  label:"Wed", week:2, date:"", contentType:"Cafe Review",   topic:"Is this overrated cafe worth it?",               hook:"Everyone's talking about this cafe. My honest verdict 👇",  location:"", status:"Planned", notes:"", format:"Carousel",    icon:"🤔" },
  { day:8,  label:"Fri", week:2, date:"", contentType:"Trend Reel",    topic:"Trend reel — funny/relatable food struggle",     hook:"Every foodie in Mumbai can relate to this 😂",              location:"", status:"Planned", notes:"", format:"Reel",         icon:"😂" },
  { day:9,  label:"Sat", week:2, date:"", contentType:"Vlog",          topic:"Trying viral food places",                      hook:"I tried every viral food spot so you don't have to",        location:"", status:"Planned", notes:"", format:"Vlog",         icon:"🎬" },
  { day:10, label:"Sun", week:2, date:"", contentType:"Educational",   topic:"3 mistakes people make while ordering food",    hook:"Stop making these 3 mistakes when you order street food",   location:"", status:"Planned", notes:"", format:"Carousel",    icon:"💡" },
  { day:11, label:"Mon", week:3, date:"", contentType:"Challenge",     topic:"Full meal under ₹200 challenge",                hook:"Can I eat a full meal for under ₹200? Watch to find out",   location:"", status:"Planned", notes:"", format:"Reel",         icon:"💪" },
  { day:12, label:"Wed", week:3, date:"", contentType:"Comparison",    topic:"Cafe vs street food comparison",                hook:"Cafe food vs street food — which actually wins? 👇",        location:"", status:"Planned", notes:"", format:"Carousel",    icon:"⚖️" },
  { day:13, label:"Fri", week:3, date:"", contentType:"Trend Reel",    topic:"Trend reel — reaction-based",                   hook:"My reaction when I tasted this for the first time 😮",      location:"", status:"Planned", notes:"", format:"Reel",         icon:"😮" },
  { day:14, label:"Sat", week:3, date:"", contentType:"Vlog",          topic:"1 day food tour in Mumbai",                     hook:"I did a 1-day food tour of Mumbai. Here's EVERYTHING",      location:"", status:"Planned", notes:"", format:"Vlog",         icon:"🗺️" },
  { day:15, label:"Sun", week:3, date:"", contentType:"Top List",      topic:"Top 5 budget eats in Mumbai",                   hook:"5 places in Mumbai where your wallet will thank you",       location:"", status:"Planned", notes:"", format:"Carousel",    icon:"🏆" },
  { day:16, label:"Mon", week:4, date:"", contentType:"Night Out",     topic:"Best late-night food spots",                    hook:"Hungry at midnight in Mumbai? I got you 🌙",                location:"", status:"Planned", notes:"", format:"Static Post", icon:"🌙" },
  { day:17, label:"Wed", week:4, date:"", contentType:"Community",     topic:"Trying followers' recommended food",            hook:"You told me where to eat. Here's what happened ❤️",         location:"", status:"Planned", notes:"", format:"Vlog",         icon:"❤️" },
  { day:18, label:"Fri", week:4, date:"", contentType:"Trend Reel",    topic:"Trend reel — hook-based",                       hook:"Stop scrolling. You need to see this 🪝",                   location:"", status:"Planned", notes:"", format:"Reel",         icon:"🪝" },
  { day:19, label:"Sat", week:4, date:"", contentType:"Vlog",          topic:"Street food marathon",                          hook:"I did a street food marathon in Mumbai. Here's the chaos",  location:"", status:"Planned", notes:"", format:"Vlog",         icon:"🏃" },
  { day:20, label:"Sun", week:4, date:"", contentType:"Must Try",      topic:"Things you MUST try at this place",             hook:"Don't leave this place without trying these 3 things 🌟",   location:"", status:"Planned", notes:"", format:"Carousel",    icon:"🌟" },
];

const statusOptions     = ["Planned","In Progress","Filmed","Edited","Posted"];
const formatOptions     = ["Reel","Carousel","Static Post","Vlog"];
const contentTypeOptions= ["Street Food","Cafe Review","Trend Reel","Mini Vlog","Top List","Hidden Gem","Educational","Challenge","Comparison","Night Out","Community","Must Try","Vlog","Other"];
const weekColors        = {1:"#FF6B35", 2:"#E63946", 3:"#2EC4B6", 4:"#9B5DE5"};

const statusStyles = {
  "Planned":     { bg:"#1E1E1E", text:"#666",    border:"#333" },
  "In Progress": { bg:"#1A2A1A", text:"#4ADE80", border:"#2D4A2D" },
  "Filmed":      { bg:"#1A1A2A", text:"#818CF8", border:"#2D2D4A" },
  "Edited":      { bg:"#2A1A2A", text:"#E879F9", border:"#4A2D4A" },
  "Posted":      { bg:"#1A2A1A", text:"#4ADE80", border:"#2D4A2D" },
};

const formatColors = {
  "Reel":"#FF6B35", "Carousel":"#2EC4B6", "Static Post":"#E63946", "Vlog":"#9B5DE5"
};

let activeWeek = null;
let expandedDay = null;

function update(dayNum, field, val) {
  const item = data.find(d => d.day === dayNum);
  if (item) {
    item[field] = val;
    refreshHeader();
    if (field === "status" || field === "format" || field === "location" || field === "topic" || field === "hook") {
      refreshCardHeader(dayNum);
    }
  }
}

function refreshHeader() {
  const posted = data.filter(d => d.status === "Posted").length;
  const progress = (posted / 20) * 100;

  const countEl = document.getElementById("postedCount");
  countEl.innerHTML = `${posted}<span class="count-denom">/20</span>`;
  countEl.className = "count-num" + (posted === 20 ? " done" : "");

  document.getElementById("progressFill").style.width = progress + "%";

  // Status pills
  const sr = document.getElementById("statusRow");
  sr.innerHTML = statusOptions.map(s => {
    const count = data.filter(d => d.status === s).length;
    const sc = statusStyles[s];
    return `<div class="status-pill" style="background:${sc.bg};color:${sc.text};border-color:${sc.border}">${count} ${s}</div>`;
  }).join("");

  // Footer message
  const footer = document.getElementById("footerMsg");
  if (footer) footer.className = "footer-msg" + (posted === 20 ? " show" : "");
}

function refreshCardHeader(dayNum) {
  const item = data.find(d => d.day === dayNum);
  if (!item) return;
  const sc = statusStyles[item.status];
  const fc = formatColors[item.format];
  const headerMeta = document.querySelector(`[data-meta="${dayNum}"]`);
  if (!headerMeta) return;
  headerMeta.innerHTML = `
    <div class="badge-row">
      <span class="format-badge" style="background:${fc}22;color:${fc}">${item.format}</span>
      <span class="status-badge" style="background:${sc.bg};color:${sc.text};border-color:${sc.border}">${item.status}</span>
      ${item.location ? `<span class="location-text">📍 ${item.location}</span>` : ""}
    </div>
    <div class="card-topic">${item.topic}</div>
    ${item.hook ? `<div class="card-hook">"${item.hook}"</div>` : ""}
  `;
}

function toggleExpand(dayNum) {
  if (expandedDay === dayNum) {
    expandedDay = null;
  } else {
    expandedDay = dayNum;
  }
  renderCalendar();
}

function setFilter(week) {
  activeWeek = week;
  document.querySelectorAll(".week-pill").forEach(el => {
    el.classList.toggle("active", el.dataset.week === String(week === null ? "all" : week));
  });
  renderCalendar();
}

function makeSelect(dayNum, field, options, currentVal) {
  const sel = document.createElement("select");
  sel.className = "field-select";
  options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = o;
    if (o === currentVal) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", () => update(dayNum, field, sel.value));
  return sel;
}

function makeEditable(dayNum, field, currentVal, placeholder) {
  const span = document.createElement("span");
  span.className = "editable-text";
  span.contentEditable = true;
  span.dataset.placeholder = placeholder;
  span.textContent = currentVal;
  span.addEventListener("input", () => update(dayNum, field, span.textContent.trim()));
  return span;
}

function makeTextarea(dayNum, field, currentVal, placeholder) {
  const ta = document.createElement("textarea");
  ta.className = "field-textarea";
  ta.placeholder = placeholder;
  ta.value = currentVal;
  ta.addEventListener("input", () => update(dayNum, field, ta.value));
  return ta;
}

function fieldGroup(label, el, full) {
  const div = document.createElement("div");
  div.className = "field-group" + (full ? " full" : "");
  const lbl = document.createElement("div");
  lbl.className = "field-label";
  lbl.textContent = label;
  div.appendChild(lbl);
  div.appendChild(el);
  return div;
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const weeks = [1,2,3,4].filter(w => activeWeek === null || w === activeWeek);

  weeks.forEach(weekNum => {
    const weekItems = data.filter(d => d.week === weekNum);
    const wColor = weekColors[weekNum];
    const weekDone = weekItems.filter(d => d.status === "Posted").length;

    const block = document.createElement("div");
    block.className = "week-block";

    // Week header
    const wh = document.createElement("div");
    wh.className = "week-header";
    wh.innerHTML = `
      <div class="week-title" style="color:${wColor}">✦ Week ${weekNum}</div>
      <div class="week-line"></div>
      <div class="week-count">${weekDone}/${weekItems.length} posted</div>
    `;
    block.appendChild(wh);

    const cards = document.createElement("div");
    cards.className = "cards";

    weekItems.forEach(item => {
      const isExpanded = expandedDay === item.day;
      const sc = statusStyles[item.status];
      const fc = formatColors[item.format];

      const card = document.createElement("div");
      card.className = "card" + (isExpanded ? " expanded" : "");
      card.style.borderLeft = `3px solid ${wColor}`;

      // Card header
      const header = document.createElement("div");
      header.className = "card-header";
      header.innerHTML = `
        <div class="day-icon-box">
          <div class="day-emoji">${item.icon}</div>
          <div class="day-label">${item.label}</div>
        </div>
        <div class="card-meta" data-meta="${item.day}">
          <div class="badge-row">
            <span class="format-badge" style="background:${fc}22;color:${fc}">${item.format}</span>
            <span class="status-badge" style="background:${sc.bg};color:${sc.text};border-color:${sc.border}">${item.status}</span>
            ${item.location ? `<span class="location-text">📍 ${item.location}</span>` : ""}
          </div>
          <div class="card-topic">${item.topic}</div>
          ${item.hook ? `<div class="card-hook">"${item.hook}"</div>` : ""}
        </div>
        <div class="expand-arrow ${isExpanded ? "open" : ""}">▾</div>
      `;
      header.addEventListener("click", () => toggleExpand(item.day));
      card.appendChild(header);

      // Card body
      const body = document.createElement("div");
      body.className = "card-body" + (isExpanded ? " open" : "");

      const hint = document.createElement("div");
      hint.className = "edit-hint";
      hint.innerHTML = "<span>✏</span> Click any field to edit";
      body.appendChild(hint);

      const grid = document.createElement("div");
      grid.className = "fields-grid";

      grid.appendChild(fieldGroup("Date",         makeEditable(item.day, "date",        item.date,        "e.g. 28 Apr"),                       false));
      grid.appendChild(fieldGroup("Status",       makeSelect(item.day, "status",        statusOptions,     item.status),                         false));
      grid.appendChild(fieldGroup("Content Type", makeSelect(item.day, "contentType",   contentTypeOptions,item.contentType),                    false));
      grid.appendChild(fieldGroup("Format",       makeSelect(item.day, "format",        formatOptions,     item.format),                         false));
      grid.appendChild(fieldGroup("Location",     makeEditable(item.day, "location",    item.location,    "e.g. Juhu Beach, Bandra"),            true));
      grid.appendChild(fieldGroup("Idea / Topic", makeEditable(item.day, "topic",       item.topic,       "What's this post about?"),            true));
      grid.appendChild(fieldGroup("Hook Line",    makeEditable(item.day, "hook",        item.hook,        "Opening line to stop the scroll..."), true));
      grid.appendChild(fieldGroup("Notes",        makeTextarea(item.day, "notes",       item.notes,       "Filming tips, hashtags, equipment, reminders..."), true));

      body.appendChild(grid);
      card.appendChild(body);
      cards.appendChild(card);
    });

    block.appendChild(cards);
    cal.appendChild(block);
  });

  // Footer
  const posted = data.filter(d => d.status === "Posted").length;
  const footerMsg = document.createElement("div");
  footerMsg.id = "footerMsg";
  footerMsg.className = "footer-msg" + (posted === 20 ? " show" : "");
  footerMsg.textContent = "🎉 All 20 posted. You're a content machine.";
  cal.appendChild(footerMsg);

  const brand = document.createElement("div");
  brand.className = "footer-brand";
  brand.textContent = "Mumbai · Food Creator · 2025 ✦";
  cal.appendChild(brand);
}

function renderFilters() {
  const fr = document.getElementById("filterRow");
  const allBtn = document.createElement("button");
  allBtn.className = "week-pill active";
  allBtn.dataset.week = "all";
  allBtn.textContent = "All";
  allBtn.addEventListener("click", () => setFilter(null));
  fr.appendChild(allBtn);

  [1,2,3,4].forEach(w => {
    const btn = document.createElement("button");
    btn.className = "week-pill";
    btn.dataset.week = String(w);
    btn.textContent = "Week " + w;
    btn.addEventListener("click", () => setFilter(w));
    fr.appendChild(btn);
  });
}

renderFilters();
refreshHeader();
renderCalendar();
</script>
</body>
</html>
